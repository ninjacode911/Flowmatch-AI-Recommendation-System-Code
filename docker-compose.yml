version: "3.9"

services:
  # ========================
  # Infrastructure Services
  # ========================

  postgres:
    image: postgres:16-alpine
    container_name: recsys-postgres
    environment:
      POSTGRES_USER: recsys
      POSTGRES_PASSWORD: recsys_dev
      POSTGRES_DB: recsys
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: recsys-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: recsys-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========================
  # Application Services
  # ========================

  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: recsys-api-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./services/api_gateway:/app/services/api_gateway
      - ./shared:/app/shared

  event-collector:
    build:
      context: .
      dockerfile: services/event_collector/Dockerfile
    container_name: recsys-event-collector
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/event_collector:/app/services/event_collector
      - ./shared:/app/shared

  user-feature-svc:
    build:
      context: .
      dockerfile: services/user_feature_svc/Dockerfile
    container_name: recsys-user-feature-svc
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/user_feature_svc:/app/services/user_feature_svc
      - ./shared:/app/shared

  ranking-svc:
    build:
      context: .
      dockerfile: services/ranking_svc/Dockerfile
    container_name: recsys-ranking-svc
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./services/ranking_svc:/app/services/ranking_svc
      - ./services/training_pipeline:/app/services/training_pipeline
      - ./shared:/app/shared
      - ./models/artifacts:/app/models/artifacts
      - ./data/synthetic:/app/data/synthetic

  llm-augment-svc:
    build:
      context: .
      dockerfile: services/llm_augment_svc/Dockerfile
    container_name: recsys-llm-augment-svc
    ports:
      - "8004:8004"
    env_file:
      - .env
    volumes:
      - ./services/llm_augment_svc:/app/services/llm_augment_svc
      - ./shared:/app/shared

  # ========================
  # Monitoring
  # ========================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: recsys-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: recsys-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
