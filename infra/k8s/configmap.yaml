apiVersion: v1
kind: ConfigMap
metadata:
  name: recsys-config
  namespace: recsys
  labels:
    app.kubernetes.io/part-of: flowmatch-recsys
data:
  APP_NAME: "flowmatch-recsys"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "recsys"
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  EMBEDDING_DIM: "384"
  CANDIDATE_TOP_K: "500"
  FINAL_TOP_K: "10"
