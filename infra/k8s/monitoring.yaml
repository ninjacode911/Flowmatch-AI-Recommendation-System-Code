apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: recsys
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway:8000"]
      - job_name: "event-collector"
        static_configs:
          - targets: ["event-collector:8001"]
      - job_name: "user-feature-svc"
        static_configs:
          - targets: ["user-feature-svc:8002"]
      - job_name: "ranking-svc"
        static_configs:
          - targets: ["ranking-svc:8003"]
      - job_name: "llm-augment-svc"
        static_configs:
          - targets: ["llm-augment-svc:8004"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: recsys
  labels:
    app: prometheus
    app.kubernetes.io/part-of: flowmatch-recsys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: recsys
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: recsys
  labels:
    app: grafana
    app.kubernetes.io/part-of: flowmatch-recsys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: recsys
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
