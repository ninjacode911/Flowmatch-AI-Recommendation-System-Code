apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-feature-svc
  namespace: recsys
  labels:
    app: user-feature-svc
    tier: feature-store
    app.kubernetes.io/part-of: flowmatch-recsys
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-feature-svc
  template:
    metadata:
      labels:
        app: user-feature-svc
        tier: feature-store
    spec:
      containers:
        - name: user-feature-svc
          image: flowmatch-recsys/user-feature-svc:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: recsys-config
            - secretRef:
                name: recsys-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-feature-svc
  namespace: recsys
spec:
  selector:
    app: user-feature-svc
  ports:
    - port: 8002
      targetPort: 8002
