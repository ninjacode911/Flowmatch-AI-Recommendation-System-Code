services:
  - type: web
    name: flowmatch-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/download_models.py
    startCommand: uvicorn services.api_gateway.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: CORS_ORIGINS
        sync: false
